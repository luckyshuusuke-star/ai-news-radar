<!doctype html>
<html lang="ja" data-radar-view="classic">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="../" />
    <title>AI News Radar｜24時間のAIニュースレーダー</title>
    <meta
      name="description"
      content="過去24時間の注目すべきAI、モデル、開発者ツールの更新を自動整理するニュースレーダーです。"
    />
    <link rel="canonical" href="https://luckyshuusuke-star.github.io/ai-news-radar/classic/" />
    <meta property="og:title" content="AI News Radar｜24時間のAIニュースレーダー" />
    <meta
      property="og:description"
      content="過去24時間の注目すべきAI、モデル、開発者ツールの更新を自動整理するニュースレーダーです。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://luckyshuusuke-star.github.io/ai-news-radar/classic/" />
    <meta property="og:site_name" content="AI News Radar" />
    <meta name="application-name" content="AI News Radar" />
    <meta name="theme-color" content="#f6f6f2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AI News Radar" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AI News Radar｜24時間のAIニュースレーダー" />
    <meta
      name="twitter:description"
      content="過去24時間の注目すべきAI、モデル、開発者ツールの更新を自動整理するニュースレーダーです。"
    />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="icon" href="./assets/icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="./site.webmanifest" />
    <script src="./assets/view-mode.js?v=dual-view-0713c" data-root="../"></script>
    <link rel="stylesheet" href="./classic/assets/styles.css?v=ja-0717a" />
    <link rel="stylesheet" href="./assets/view-switch.css?v=dual-view-0713b" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-main">
          <div class="hero-headline">
            <img class="hero-logo" src="./assets/logo.svg" alt="AI News Radar Logo" />
            <div>
              <h1>AI News Radar</h1>
              <div class="hero-updated hero-view-row">
                <span class="updated-label">更新日時</span>
                <span class="updated" id="updatedAt">読み込み中...</span>
                <div class="view-switch" role="group" aria-label="表示切り替え">
                  <span class="view-switch-label">表示</span>
                  <button class="view-switch-btn" type="button" data-radar-view-target="mobile">モバイル版</button>
                  <button class="view-switch-btn" type="button" data-radar-view-target="classic">クラシック版</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="hero-meta">
          <span class="source-status-pill" id="sourceStatusPill">ソース状態を読み込み中</span>
          <div class="hero-links" aria-label="プロジェクト">
            <a
              class="hero-link"
              data-site-repository
              href="https://github.com/luckyshuusuke-star/ai-news-radar"
              target="_blank"
              rel="noopener noreferrer"
            >この日本語版のGitHub</a>
            <a
              class="hero-link"
              data-original-repository
              href="https://github.com/LearnPrompt/ai-news-radar"
              target="_blank"
              rel="noopener noreferrer"
            >原作者・オリジナル版</a>
          </div>
        </div>

        <section class="stats" id="stats"></section>

        <section class="section-nav-wrap" aria-label="カテゴリー">
          <div class="section-tabs" id="sectionTabs" role="tablist" aria-label="AIニュースカテゴリー"></div>
          <div class="section-summary" id="sectionSummary">カテゴリーを整理中...</div>
        </section>
      </header>

      <section class="primary-controls">
        <input id="searchInput" type="search" placeholder="AIニュース・ソースを検索" />
        <div class="mode-hint" id="modeHint">AI高関連</div>
      </section>

      <div class="sticky-summary-bar" aria-label="現在の表示概要">
        <strong>AI News Radar</strong>
        <span id="stickySummaryText">24時間のニュースを整理中...</span>
      </div>

      <details class="advanced-panel">
          <summary>
            <span>詳細フィルター</span>
            <span class="advanced-summary" id="advancedSummary">読み込み中...</span>
          </summary>
          <div class="advanced-content">
            <div class="advanced-controls">
            <label class="field">
              <span>期間</span>
              <select id="timeRangeSelect" aria-label="期間">
                <option value="24h">過去24時間</option>
              </select>
            </label>
            <label class="field">
              <span>ソース種別</span>
              <select id="sourceTypeSelect">
                <option value="">すべてのソース</option>
                <option value="official">公式・一次情報</option>
                <option value="media">厳選メディア・ニュースレター</option>
                <option value="community">コミュニティ・HN・Builders</option>
                <option value="rss">RSS / OPML</option>
                <option value="aggregate">アグリゲーター</option>
                <option value="creator">クリエイター</option>
                <option value="advanced">拡張ソース</option>
              </select>
            </label>
            <label class="field">
              <span>カテゴリー</span>
              <select id="sectionSelect"></select>
            </label>
            <label class="field">
              <span>重要度</span>
              <select id="signalLevelSelect">
                <option value="">すべて</option>
                <option value="high">高優先度</option>
                <option value="curated">厳選・公式</option>
                <option value="multi">複数ソース確認済み</option>
              </select>
            </label>
            <label class="field">
              <span>ソース</span>
              <select id="siteSelect">
                <option value="">すべてのサイト</option>
              </select>
            </label>
            <div class="field">
              <span>AI関連度</span>
              <div class="mode-switch">
                <button id="modeAiBtn" class="mode-btn active" type="button">AI高関連</button>
                <button id="modeAllBtn" class="mode-btn" type="button">全件</button>
              </div>
            </div>
            <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
              <input id="allDedupeToggle" type="checkbox" checked />
              <span class="all-dedupe-dot"></span>
              <span id="allDedupeLabel">重複を統合</span>
            </label>
          </div>
          <div class="data-source-indicator" id="dataSourceIndicator" hidden>
            <span id="dataSourceIndicatorText"></span>
            <button type="button" id="dataSourceResetBtn" class="data-source-reset-btn">ローカルに戻す</button>
          </div>
          <div class="source-health" id="sourceHealth">ソース状態を読み込み中...</div>
          <details class="source-detail-panel">
            <summary>ソース状態の詳細</summary>
            <div class="source-health-details" id="sourceHealthDetails"></div>
            <section class="coverage-strip" id="coverageStrip" aria-label="Source coverage status"></section>
            <section class="source-status-table" id="sourceStatusTable" aria-label="ソース状態の詳細"></section>
            <section class="site-pills" id="sitePills"></section>
            </details>
          </div>
      </details>

      <section class="bole-picks-wrap" aria-label="今日のTop 3" id="bolePicksWrap">
        <div class="bole-picks-head">
          <div>
            <p class="section-eyebrow">TODAY'S SIGNALS</p>
            <h2 id="topStoriesTitle">今日の重要ニュース</h2>
          </div>
          <div class="bole-head-tools">
            <div class="bole-view-toggle" id="boleViewToggle" hidden>
              <button id="boleHotBtn" class="mode-btn" type="button">注目</button>
              <button id="boleTimelineBtn" class="mode-btn" type="button">時系列</button>
            </div>
            <span id="bolePicksMeta">重要度順</span>
          </div>
        </div>
        <div id="bolePicksList" class="bole-board"></div>
      </section>

      <section class="waytoagi-wrap">
        <div class="waytoagi-head">
          <h2>コミュニティ更新・WaytoAGI</h2>
          <div class="waytoagi-tools">
            <div class="waytoagi-switch">
              <button id="waytoagiTodayBtn" class="waytoagi-btn active" type="button">最新日</button>
              <button id="waytoagi7dBtn" class="waytoagi-btn" type="button">直近7日</button>
            </div>
            <span id="waytoagiUpdatedAt">読み込み中...</span>
          </div>
        </div>
        <div id="waytoagiMeta" class="waytoagi-meta"></div>
        <div id="waytoagiList" class="waytoagi-list"></div>
      </section>

      <section class="list-wrap">
        <div class="list-head">
          <h2 id="listTitle">AIニュース一覧</h2>
          <div class="list-head-tools">
            <div class="list-sort-tools" id="listSortTools" role="group" aria-label="一覧の並び順">
              <button class="list-sort-btn active" type="button" data-sort="priority" title="ソース品質、AI関連度、鮮度、シグナル強度を総合">総合</button>
              <button class="list-sort-btn" type="button" data-sort="latest" title="公開または発見日時の新しい順">最新</button>
              <button class="list-sort-btn" type="button" data-sort="ai" title="AI関連度の高い順">高関連</button>
              <button class="list-sort-btn" type="button" data-sort="source" title="ソースの安定度順">ソース</button>
            </div>
            <span id="resultCount">0件</span>
          </div>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>

    </main>

    <template id="itemTpl">
      <article class="news-card">
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
        <div class="meta-row">
          <span class="site"></span>
          <span class="category"></span>
          <span class="source"></span>
          <time class="time"></time>
        </div>
        <p class="news-summary"></p>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js" integrity="sha384-HOvlOYPIs/zjoIkWUGXkVmXsjr8GuZLV+Q+rcPwmJOVZVpvTSXQChiN4t9Euv9Vc" crossorigin="anonymous" defer></script>
    <script src="./classic/assets/motion.js?v=ui-adjustment-0620a" defer></script>
    <script src="./classic/assets/app.js?v=ja-0717d" defer></script>
  </body>
</html>
